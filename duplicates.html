<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Title Twins – Duplicates</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="app-style.css">
  <style>
    .groupCard{
      border:1px solid var(--borderSoft);
      border-radius:16px;
      padding:12px;
      margin-bottom:16px;
      background:rgba(15,23,42,.6);
    }
    .groupTitle{
      font-size:15px;
      font-weight:600;
      margin-bottom:8px;
      color:var(--text);
    }
    .imgRow{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }
    .imgCard{
      width:90px;
      border:1px solid var(--borderSoft);
      border-radius:12px;
      padding:6px;
      background:rgba(15,23,42,.9);
      cursor:pointer;
      text-align:center;
    }
    .imgCard:hover{
      background:rgba(30,64,175,.5);
    }
    .imgThumb{
      width:100%;
      height:80px;
      object-fit:cover;
      border-radius:8px;
      margin-bottom:6px;
    }
    .imgMeta{
      font-size:10px;
      color:var(--muted);
    }

    /* Modal styles copied from main app so editor feels consistent */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.78);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:1000;
    }
    .modalInner{
      background:#050c0a;
      border:1px solid var(--ring);
      border-radius:12px;
      width:min(680px,96vw);
      max-height:96vh;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      overflow-y:auto;
    }
    .previewImgWrap{
      position:relative;
      max-width:92vw;
      max-height:70vh;
      margin:0 auto;
    }
    .previewImgWrap img{
      max-width:100%;
      max-height:70vh;
      display:block;
      margin:0 auto;
      border-radius:10px;
    }
    @media (max-width:700px){
      .previewImgWrap,
      .previewImgWrap img{
        max-height:60vh;
      }
    }
    .modalFields{
      display:flex;
      flex-direction:column;
      gap:10px;
      font-size:12px;
      color:var(--muted);
      align-items:flex-start;
    }
    .modalField{
      width:min(100%, 340px);
    }
    .modalFieldLabel{
      margin-bottom:4px;
    }
    .modalFields input{
      width:100%;
      background:#050c0a;
      border:1px solid var(--ring);
      color:var(--text);
      border-radius:8px;
      padding:6px 7px;
      font-size:13px;
    }
    .dateValue{
      color:var(--text);
      font-size:13px;
      padding:6px 0;
    }
    .modalFooter{
      display:flex;
      justify-content:flex-start;
      gap:8px;
      margin-top:4px;
    }
    @media (max-width:700px){
      .modalField{
        width:100%;
      }
      .modalFooter{
        width:100%;
        justify-content:center;
      }
    }
  </style>
</head>
<body>
  <header class="pageHeader">
    <div>
      <h1>Title Twins</h1>
      <div class="subhead">Images that share the same exact title</div>
    </div>
    <div class="navMenuShell">
      <details class="navDropdown">
        <summary class="navTrigger">Menu ▾</summary>
        <div class="navMenuList">
          <a class="navItem" href="index.html?tab=Library">Library</a>
          <a class="navItem" href="index.html?tab=Matchups">Matchups</a>
          <a class="navItem" href="index.html?tab=Stats">Stats</a>
          <a class="navItem" href="index.html?tab=Collections">Collections</a>
          <div class="navSpacer"></div>
          <a class="navItem" href="tourney.html">Tournament</a>
          <a class="navItem" href="settings.html">Settings</a>
        </div>
      </details>
    </div>
  </header>

  <div style="margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap;">
    <a href="index.html" class="tab">← Back to Library</a>
    <a href="sizes.html" class="tab">Image Sizes</a>
    <a href="duplicates.html" class="tab active">Title Twins</a>
    <a href="normalize-urls.html" class="tab">Normalize URLs</a>
    <a href="unmigrated-report.html" class="tab">Unmigrated Report</a>
    <a href="migrate.html" class="tab">Firebase Migration</a>
  </div>

  <div id="summary" class="pill" style="margin-bottom:12px;"></div>

  <div id="container"></div>

<script>
const DB_NAME = 'modelMatchupDB';
const DB_STORE = 'items';

function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME);
    req.onupgradeneeded = ()=> {
      const db = req.result;
      if(!db.objectStoreNames.contains(DB_STORE)){
        db.createObjectStore(DB_STORE,{keyPath:'id'});
      }
    };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}

async function loadAll(){
  const db = await openDB();
  const tx = db.transaction(DB_STORE,'readonly');
  const st = tx.objectStore(DB_STORE);
  const all = [];
  return await new Promise((resolve)=>{
    const req = st.openCursor();
    req.onsuccess = e=>{
      const c = e.target.result;
      if(!c){ resolve(all); return; }
      all.push(c.value);
      c.continue();
    };
  });
}

// ----- Helpers shared with main app -----
const normalizeCollectionName = (value)=>String(value || '').trim().toLowerCase();
const normalizeCollections = (value)=>{
  if(!value) return [];
  const parts = Array.isArray(value) ? value : String(value).split(',');
  return Array.from(new Set(
    parts.map(normalizeCollectionName).filter(Boolean)
  ));
};
const collectionsToString = arr => (arr && arr.length ? arr.join(', ') : '');

// ----- In-memory cache + render pipeline -----
let allItems = [];

function buildAndRenderGroups(){
  const map = new Map();
  for(const it of allItems){
    const t = (it.title || '').trim();
    if(!map.has(t)) map.set(t, []);
    map.get(t).push(it);
  }

  const groups = [];
  for(const [title, arr] of map){
    if(arr.length > 1){
      groups.push({title, items: arr});
    }
  }

  groups.sort((a,b)=> a.title.localeCompare(b.title));
  render(groups);
}

async function patchItem(id, patch){
  const idx = allItems.findIndex(it => it.id === id);
  if(idx === -1) return;

  const updated = Object.assign({}, allItems[idx], patch);
  allItems[idx] = updated;

  const db = await openDB();
  await new Promise((resolve, reject)=>{
    const tx = db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).put(updated);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });

  buildAndRenderGroups();
}

async function deleteItem(id){
  const db = await openDB();
  await new Promise((resolve, reject)=>{
    const tx = db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });

  allItems = allItems.filter(it => it.id !== id);
  buildAndRenderGroups();
}

// ----- Preview modal -----
function openPreview(item){
  // remove any existing modal first
  const existing = document.querySelector('.modal');
  if(existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'modal';
  overlay.onclick = ()=>overlay.remove();

  const inner = document.createElement('div');
  inner.className = 'modalInner';
  inner.onclick = e=>e.stopPropagation();

  const showImagePreview = window.matchMedia('(max-width: 700px)').matches;
  if(showImagePreview){
    const imgWrap = document.createElement('div');
    imgWrap.className = 'previewImgWrap';
    const img = document.createElement('img');
    img.src = item.fullUrl || item.thumbnail || item.thumbDataUrl || item.dataUrl || '';
    img.alt = item.title || 'Image';
    imgWrap.appendChild(img);
    inner.appendChild(imgWrap);
  }

  const fields = document.createElement('div');
  fields.className = 'modalFields';

  // Title field
  const titleBlock = document.createElement('div');
  titleBlock.className = 'modalField';
  const titleLabel = document.createElement('div');
  titleLabel.className = 'modalFieldLabel';
  titleLabel.textContent = 'Title';
  const titleInput = document.createElement('input');
  titleInput.value = item.title || '';
  titleInput.addEventListener('blur', ()=>{
    const val = titleInput.value.trim();
    patchItem(item.id, { title: val });
  });
  titleBlock.appendChild(titleLabel);
  titleBlock.appendChild(titleInput);
  fields.appendChild(titleBlock);

  // Collections field
  const collBlock = document.createElement('div');
  collBlock.className = 'modalField';
  const collLabel = document.createElement('div');
  collLabel.className = 'modalFieldLabel';
  collLabel.textContent = 'Collections';
  const collInput = document.createElement('input');
  collInput.value = collectionsToString(item.collections);
  collInput.addEventListener('blur', ()=>{
    const arr = normalizeCollections(collInput.value);
    patchItem(item.id, { collections: arr });
    collInput.value = collectionsToString(arr);
  });
  collBlock.appendChild(collLabel);
  collBlock.appendChild(collInput);
  fields.appendChild(collBlock);

  // Record fields
  const winsBlock = document.createElement('div');
  winsBlock.className = 'modalField';
  const winsLabel = document.createElement('div');
  winsLabel.className = 'modalFieldLabel';
  winsLabel.textContent = 'Wins';
  const winsInput = document.createElement('input');
  winsInput.type = 'number';
  winsInput.min = '0';
  winsInput.step = '1';
  winsInput.value = String(item.wins || 0);
  winsInput.addEventListener('blur', ()=>{
    const next = Math.max(0, Number(winsInput.value || 0));
    winsInput.value = String(next);
    patchItem(item.id, { wins: next });
  });
  winsBlock.appendChild(winsLabel);
  winsBlock.appendChild(winsInput);
  fields.appendChild(winsBlock);

  const lossesBlock = document.createElement('div');
  lossesBlock.className = 'modalField';
  const lossesLabel = document.createElement('div');
  lossesLabel.className = 'modalFieldLabel';
  lossesLabel.textContent = 'Losses';
  const lossesInput = document.createElement('input');
  lossesInput.type = 'number';
  lossesInput.min = '0';
  lossesInput.step = '1';
  lossesInput.value = String(item.losses || 0);
  lossesInput.addEventListener('blur', ()=>{
    const next = Math.max(0, Number(lossesInput.value || 0));
    lossesInput.value = String(next);
    patchItem(item.id, { losses: next });
  });
  lossesBlock.appendChild(lossesLabel);
  lossesBlock.appendChild(lossesInput);
  fields.appendChild(lossesBlock);

// Date Added
const dateBlock = document.createElement('div');
dateBlock.className = 'modalField';
const dateLabel = document.createElement('div');
dateLabel.className = 'modalFieldLabel';
dateLabel.textContent = 'Date Added';

const dateValue = document.createElement('div');
dateValue.className = 'dateValue';

const d = item.createdAt ? new Date(item.createdAt) : null;
dateValue.textContent = d ? d.toLocaleString() : 'Unknown';

dateBlock.appendChild(dateLabel);
dateBlock.appendChild(dateValue);
fields.appendChild(dateBlock);


  inner.appendChild(fields);

  const footer = document.createElement('div');
  footer.className = 'modalFooter';

  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'btn danger';
  deleteBtn.textContent = 'Delete';
  deleteBtn.onclick = async ()=>{
    if(!confirm('Delete this image? This cannot be undone unless you have an export.')) return;
    await deleteItem(item.id);
    overlay.remove();
  };

  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn';
  closeBtn.textContent = 'Close';
  closeBtn.onclick = ()=>overlay.remove();

  footer.appendChild(deleteBtn);
  footer.appendChild(closeBtn);
  inner.appendChild(footer);

  overlay.appendChild(inner);
  document.body.appendChild(overlay);
}

function render(groups){
  const container = document.getElementById('container');
  container.innerHTML='';

  const titleCount = groups.length;
  const imgCount = groups.reduce((a,g)=>a+g.items.length,0);

  document.getElementById('summary').textContent =
    `${titleCount} titles • ${imgCount} images with duplicates`;

  for(const g of groups){
    const card = document.createElement('div');
    card.className='groupCard';

    const title = document.createElement('div');
    title.className='groupTitle';
    title.textContent = g.title || '(Untitled)';
    card.appendChild(title);

    const row = document.createElement('div');
    row.className='imgRow';

    for (const it of g.items) {
      const div = document.createElement('div');
      div.className = 'imgCard';
      div.onclick = () => openPreview(it);

      const img = document.createElement('img');
      img.className = 'imgThumb';
      img.src =
        it.thumbnail ||
        it.thumbDataUrl ||
        it.fullUrl ||
        it.dataUrl ||
        '';

      div.appendChild(img);

      const meta = document.createElement('div');
      meta.className = 'imgMeta';
      meta.textContent = `ID: ${it.id.slice(0, 6)}…`;
      div.appendChild(meta);

      row.appendChild(div);
    }

    card.appendChild(row);
    container.appendChild(card);
  }
}

async function init(){
  allItems = await loadAll();
  buildAndRenderGroups();
}

init();
</script>
</body>
</html>
